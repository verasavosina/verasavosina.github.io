<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <title>Оформление вертикального меню</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 <style>
  html {
   background: #f0f0f0;
  }
  
  .menu {
   width: 200px;
   background: #fff;
   border: 1px solid #cccccc;
  }
  
  .menu ul {
   list-style: none;
   margin: 0;
   padding: 0;
  }
  
  .menu li {
   position: relative;
  }
  
  .menu li a {
   display: block;
   padding: 10px 15px;
   text-decoration: none;
   color: #333;
   border-bottom: 1px solid #eeeeee;
  }
  
  .menu li a:hover {
   background: #ffffcc;
  }

  .menu li ul {
   display: none;
   position: absolute;
   left: 100%;
   top: 0;
   width: 200px;
   background: #fff;
   border: 1px solid #ccc;
  }

  .menu li:hover > ul {
   display: block;
  }

  .menu li ul li a::before {
   content: "\f192";
   font-family: "Font Awesome 6 Free";
   font-weight: 900;
   margin-right: 10px;
   color: #000000;
  }

  .menu > ul > li > a::before {
   content: "\f0fe";
   font-family: "Font Awesome 6 Free";
   font-weight: 900;
   margin-right: 10px;
   color: #000000;
  }

  .menu > ul > li:hover > a::before {
   content: "\f146";
  }
 </style>
</head>
<body>
 <nav class="menu">
  <ul>
   <li><a href="#">Фильмы</a>
    <ul>
     <li><a href="#">Экшн</a></li>
     <li><a href="#">Мелодрамы</a></li>
     <li><a href="#">Сериалы</a></li>
     <li><a href="#">Семейные</a></li>
    </ul>
   </li>
   <li><a href="#">Музыка</a>
    <ul>
     <li><a href="#">Классика</a></li>
     <li><a href="#">Джаз</a></li>
     <li><a href="#">Рок</a></li>
     <li><a href="#">Грандж</a></li>
    </ul>
   </li>
   <li><a href="#">Софт</a>
    <ul>
     <li><a href="#">Графика</a></li>
     <li><a href="#">3D-моделирование</a></li>
     <li><a href="#">Машинопись</a></li>
     <li><a href="#">Переводчики</a></li>
    </ul>
   </li>
   <li><a href="#">Игры</a>
    <ul>
     <li><a href="#">РПГ</a></li>
     <li><a href="#">Шутеры</a></li>
     <li><a href="#">Пасьянсы</a></li>
    </ul>
   </li>
  </ul>
 </nav>
</body>
</html>
